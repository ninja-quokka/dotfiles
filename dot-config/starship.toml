"$schema" = 'https://starship.rs/config-schema.json'

# Todo: Convert this to a j2 template to make switching themes better

format = """
[ΌΓ╢](os_bg)$os$username[ΌΓ┤]\
(bg:dir_bg fg:os_bg)\
$directory[ΌΓ┤]\
(fg:dir_bg bg:git_bg)\
$git_branch$git_status[ΌΓ┤]\
(fg:git_bg bg:lang_bg)\
$c$rust$golang$python$direnv[ΌΓ┤]\
(fg:lang_bg bg:red)\
$cmd_duration[ΌΓ┤ ](red)\
$fill\
([ ΌΓ╢](os_bg)$time${battery}[ΌΓ┤](fg:os_bg))
$line_break$character"""

palette = 'custom_theme'

[palettes.custom_theme]
# Mapping your provided colors
red = "#F97791"
green = "#38FFA5"
purple = "#A592FF"
yellow = "#FFE77A"
orange = "#FFA064"
blue = "#5CCEFF"
cyan = "#0AE7FF"
os_bg = "#414868"   # terminal_black
os_fg = "#B9B8D3"   # dark5
dir_bg = "#5CCEFF"  # blue
dir_fg = "#2C313A"  # bg_highlight
git_bg = "#38FFA5"  # green
git_fg = "#2C313A"  # bg_highlight
lang_bg = "#A592FF" # purple
lang_fg = "#2C313A" # bg_highlight

[os]
disabled = false
style = "bg:os_bg fg:os_fg"
format = '[$symbol]($style)'

[os.symbols]
Arch = "ΎΝΔ"
Debian = "≤░μγ"
Fedora = "≤░μδ"
Linux = "≤░Ν╜"
Macos = "≤░Α╡"
NixOS = "≤▒ΕΖ"
Ubuntu = "≤░ΧΙ"
Windows = "≤░Ξ▓"

[username]
show_always = true
style_user = "bg:os_bg fg:os_fg"
style_root = "bg:os_bg fg:os_fg"
format = '[ $user ]($style)'

[directory]
style = "fg:dir_fg bg:dir_bg"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "

[git_branch]
symbol = "ΎΡα"
style = "bg:git_bg"
format = '[[ $symbol $branch ](fg:git_fg bg:git_bg)]($style)'

[git_status]
disabled = false
ahead = 'έΘκ${count}'
diverged = 'έΘΧέΘκ${ahead_count}έΘμ${behind_count}'
behind = 'έΘμ${count}'
style = "bg:git_bg"
format = '[[($ahead_behind )](fg:git_fg bg:git_bg)]($style)'

[python]
symbol = "ΌαΗ "
style = "bg:lang_bg"
# Updated to only show when a virtualenv is active
format = '[[ $symbol( $version) (\($virtualenv\)) ](fg:lang_fg bg:lang_bg)]($style)'
pyenv_version_name = false
detect_extensions = [] # Prevents loading just because a .py file exists

[rust]
symbol = "Όηρ"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)'

[golang]
symbol = "Όαπ"
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)'

[c]
symbol = "Όαη "
style = "bg:lang_bg"
format = '[[ $symbol( $version) ](fg:lang_fg bg:lang_bg)]($style)'

[cmd_duration]
format = '[[ ≤▒οθ $duration ](bg:red fg:os_bg)]($style)'
show_milliseconds = true

[direnv]
disabled = false
symbol = "≤░ΤΥ "
style = "bg:lang_bg"
format = '[[ $symbol](fg:lang_fg bg:lang_bg)]($style)'
loaded_msg = ""
unloaded_msg = ""

[fill]
symbol = " "

[time]
disabled = false
use_12hr = false
format = '[[ ≤░ξΦ $time ](fg:os_fg bg:os_bg)]($style)'

[battery]
# This controls the global behavior
# It will only show the battery if it matches one of the thresholds below
full_symbol = ""
charging_symbol = ""
discharging_symbol = ""
format = '[$symbol$percentage]($style)'

[[battery.display]]
# Only show when 20% or lower
threshold = 20
style = "bold bg:os_bg fg:red"
discharging_symbol = "≤░Β║ "
charging_symbol = "" # Leave empty to hide when plugged in at low battery

[character]
success_symbol = '[έζψ](bold fg:green)'
error_symbol = '[ΎΣπ](bold fg:red)'
vimcmd_symbol = '[≤░ΖΒ](bold fg:green)'
vimcmd_replace_one_symbol = '[≤░ΖΒ](bold fg:purple)'
vimcmd_replace_symbol = '[≤░ΖΒ](bold fg:purple)'
vimcmd_visual_symbol = '[≤░ΖΒ](bold fg:yellow)'
